services:
  website:
    container_name: musanzi-website
    build:
      context: .
      target: development
    restart: unless-stopped
    command: pnpm dev:website --host=0.0.0
    ports:
      - '4200:4200'
    volumes:
      - .:/app
      - /app/node_modules

  admin:
    container_name: musanzi-admin
    build:
      context: .
      target: development
    restart: unless-stopped
    command: pnpm dev:admin --host=0.0.0
    ports:
      - '4300:4300'
    volumes:
      - .:/app
      - /app/node_modules
