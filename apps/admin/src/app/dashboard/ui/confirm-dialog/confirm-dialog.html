<h2 mat-dialog-title class="flex items-center gap-2">
  <mat-icon class="text-error" svgIcon="triangle-alert" />
  {{ data.title }}
</h2>

<mat-dialog-content>
  <p class="text-sm text-on-surface-variant">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton type="button" [mat-dialog-close]="false">{{ data.cancelLabel ?? 'Cancel' }}</button>
  <button matButton="filled" class="error" type="button" [mat-dialog-close]="true">
    {{ data.confirmLabel ?? 'Delete' }}
  </button>
</mat-dialog-actions>
