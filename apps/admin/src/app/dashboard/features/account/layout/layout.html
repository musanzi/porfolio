<div class="flex w-full flex-auto flex-col items-start gap-5 p-4 text-neutral-950 dark:text-white sm:p-6 lg:p-8">
  <div class="w-full max-w-2xl">
    <h1 class="text-2xl font-semibold tracking-tight">Profile settings</h1>
    <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-400">Manage your account information and password.</p>
  </div>

  <nav mat-tab-nav-bar [mat-stretch-tabs]="false" [tabPanel]="tabPanel">
    @for (link of links; track link.id) {
    <a mat-tab-link routerLinkActive [routerLink]="link.route" [active]="rla.isActive" #rla="routerLinkActive">
      {{ link.label }}
    </a>
    }
  </nav>

  <mat-form-field class="w-full max-w-2xl sm:hidden">
    <mat-select [value]="router.url" (selectionChange)="router.navigateByUrl($event.value)">
      @for (link of links; track link.id) {
      <mat-option [value]="link.route">{{ link.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-tab-nav-panel
    class="w-full max-w-2xl rounded border border-neutral-200 bg-white p-5 shadow-sm dark:border-neutral-800 dark:bg-neutral-900 sm:p-8"
    #tabPanel>
    <router-outlet />
  </mat-tab-nav-panel>
</div>
