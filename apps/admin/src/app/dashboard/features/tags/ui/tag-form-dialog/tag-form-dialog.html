<h2 mat-dialog-title>{{ isEdit() ? 'Edit tag' : 'Create tag' }}</h2>

<form (submit)="save($event)">
  <mat-dialog-content class="min-w-80">
    <mat-form-field class="w-full">
      <mat-label>Name</mat-label>
      <input matInput [formField]="tagForm.name" autocomplete="off" cdkFocusInitial />
      @if ((tagForm.name().touched() || tagForm.name().dirty()) && tagForm.name().errors()[0]; as error) {
      <mat-error>{{ error.message }}</mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton type="button" [mat-dialog-close]="undefined">Cancel</button>
    <button matButton="filled" type="submit" [disabled]="tagForm().invalid()">
      <mat-icon svgIcon="save" />
      {{ isEdit() ? 'Save' : 'Create' }}
    </button>
  </mat-dialog-actions>
</form>
