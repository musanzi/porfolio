<section id="services" class="mb-14 scroll-mt-8 md:mb-22">
  <div class="flex items-center gap-2">
    <p class="inline-flex items-center gap-2 text-base font-bold whitespace-nowrap text-gray-500 dark:text-gray-300">
      <mat-icon class="size-4.5" svgIcon="workflow" />
      Services
    </p>
    <div class="h-px w-full bg-gray-300 dark:bg-gray-600"></div>
  </div>
  <h2 class="mt-3 mb-6 max-w-[18ch] text-3xl leading-tight font-bold text-gray-950 md:text-4xl dark:text-gray-50">
    What I do.
  </h2>
  <div class="grid gap-x-10 gap-y-7 md:grid-cols-2">
    @for (service of services; track service.title) {
    <article>
      <h3 class="relative text-2xl leading-snug font-medium text-gray-950 dark:text-gray-50">{{ service.title }}</h3>
      <p class="mt-3 text-lg leading-7 text-gray-600 dark:text-gray-300">{{ service.summary }}</p>
      <div class="mt-4 flex flex-wrap gap-2">
        @for (skill of service.skills; track skill.label) {
        <span
          class="inline-flex min-h-9 items-center gap-2 rounded-md border border-gray-200 bg-white px-3 py-1.5 text-base leading-none font-bold text-gray-700 dark:border-zinc-700 dark:bg-zinc-800 dark:text-gray-200">
          @if (skill.logo) {
          <img class="size-5 object-contain" [src]="skill.logo" alt="{{ skill.label }} logo" />
          }
          <span>{{ skill.label }}</span>
        </span>
        }
      </div>
    </article>
    }
  </div>
</section>
