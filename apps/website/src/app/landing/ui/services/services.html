<section id="services" class="mb-14 scroll-mt-8 md:mb-22">
  <div class="flex items-center gap-2">
    <p class="font-bold whitespace-nowrap text-gray-500 dark:text-gray-300">
      <span class="mr-1 inline-block text-xs">0.2</span>
      Services
    </p>
    <div class="h-px w-full bg-gray-300 dark:bg-gray-600"></div>
  </div>
  <h2 class="mt-2 mb-5 max-w-[18ch] text-3xl leading-tight font-bold text-gray-950 dark:text-gray-50">What I do.</h2>
  <div class="grid gap-x-10 gap-y-5 md:grid-cols-2">
    @for (service of services; track service.title) {
    <article>
      <h3 class="relative text-xl font-medium text-gray-950 dark:text-gray-50">{{ service.title }}</h3>
      <p class="mt-2 text-gray-600 dark:text-gray-300">{{ service.summary }}</p>
      <div class="mt-4 flex flex-wrap gap-2">
        @for (skill of service.skills; track skill.label) {
        <span
          class="inline-flex min-h-8 items-center gap-2 rounded-md border border-gray-200 bg-white px-2.5 py-1.5 text-sm leading-none font-bold text-gray-700 dark:border-zinc-700 dark:bg-zinc-800 dark:text-gray-200">
          @if (skill.logo) {
          <img class="size-5 object-contain" [src]="skill.logo" alt="{{ skill.label }} logo" />
          }
          <span>{{ skill.label }}</span>
        </span>
        }
      </div>
    </article>
    }
  </div>
</section>
