<section id="skills" class="mb-14 scroll-mt-8 md:mb-22">
  <div class="flex items-center gap-2">
    <p class="inline-flex items-center gap-2 text-base font-bold whitespace-nowrap text-gray-500 dark:text-gray-300">
      <mat-icon class="size-4.5" svgIcon="wrench" />
      Skills
    </p>
    <div class="h-px w-full bg-gray-300 dark:bg-gray-600"></div>
  </div>
  <h2 class="mt-3 mb-6 max-w-[18ch] text-3xl leading-tight font-bold text-gray-950 md:text-4xl dark:text-gray-50">
    Tools I use regularly.
  </h2>
  <div class="grid gap-5">
    @for (group of skillGroups; track group.title) {
    <article class="grid gap-3 pb-4 md:grid-cols-[9rem_minmax(0,1fr)]">
      <h3 class="flex items-center gap-2 text-lg font-medium text-gray-950 dark:text-gray-50">
        <span
          class="inline-flex size-6 items-center justify-center rounded-full bg-gray-950 text-xs text-white dark:bg-white dark:text-zinc-900">
          {{ $index + 1 }}
        </span>
        {{ group.title }}
      </h3>
      <div class="flex flex-wrap gap-2">
        @for (item of group.items; track item.label) {
        <span
          class="inline-flex min-h-9 items-center gap-2 rounded-md border border-gray-200 bg-white px-3 py-1.5 text-base leading-none font-bold text-gray-700 dark:border-zinc-700 dark:bg-zinc-800 dark:text-gray-200">
          @if (item.logo) {
          <img class="size-5 object-contain" [src]="item.logo" alt="{{ item.label }} logo" />
          }
          <span>{{ item.label }}</span>
        </span>
        }
      </div>
    </article>
    }
  </div>
</section>
