<section id="skills" class="mb-14 scroll-mt-8 md:mb-22">
  <div class="flex items-center gap-2">
    <p class="font-bold whitespace-nowrap text-gray-500 dark:text-gray-300">
      <span class="mr-1 inline-block text-xs">0.3</span>
      Skills
    </p>
    <div class="h-px w-full bg-gray-300 dark:bg-gray-600"></div>
  </div>
  <h2 class="mt-2 mb-5 max-w-[18ch] text-3xl leading-tight font-bold text-gray-950 dark:text-gray-50">
    Tools I use regularly.
  </h2>
  <div class="grid gap-4">
    @for (group of skillGroups; track group.title) {
    <article class="grid gap-2 pb-4 md:grid-cols-[8rem_minmax(0,1fr)]">
      <h3 class="flex items-center gap-2 font-medium text-gray-950 dark:text-gray-50">
        <span
          class="inline-flex size-5 items-center justify-center rounded-full bg-gray-950 text-[0.65rem] text-white dark:bg-white dark:text-zinc-900">
          {{ $index + 1 }}
        </span>
        {{ group.title }}
      </h3>
      <div class="flex flex-wrap gap-2">
        @for (item of group.items; track item.label) {
        <span
          class="inline-flex min-h-8 items-center gap-2 rounded-md border border-gray-200 bg-white px-2.5 py-1.5 text-sm leading-none font-bold text-gray-700 dark:border-zinc-700 dark:bg-zinc-800 dark:text-gray-200">
          @if (item.logo) {
          <img class="size-5 object-contain" [src]="item.logo" alt="{{ item.label }} logo" />
          }
          <span>{{ item.label }}</span>
        </span>
        }
      </div>
    </article>
    }
  </div>
</section>
